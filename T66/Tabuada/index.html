<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada</title>
</head>
<body>
    <script>
        let numero = parseInt(prompt("Digite um número para ver a tabuada:"));
        let i = 1;

          do {
            console.log(`${numero} x ${i} = ${numero * i}`);
            i++;
          } while (i <= 10); 
            
    </script>
</body>
</html>
