<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0 A 30 DE 3 EM 3</title>
</head>
<body>
    <script>
        let contador = 0;
        do {
            console.log(contador);
            contador += 3;
        } while (contador <= 30);
        console.log("Acabou!");
    </script>
</body>
</html>
