<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vetor de Nomes</title>
</head>
<body>
    <script>
        const nomes = [];
        for (let i = 0; i < 7; i++) {
            const nome = prompt(`Digite o nome da pessoa ${i + 1}:`);
            nomes.push(nome);
        }
        console.log("Nomes na ordem inversa:");
        for (let i = nomes.length - 1; i >= 0; i--) {
            console.log(nomes[i]);
        }
    </script>
</body>
</html>
