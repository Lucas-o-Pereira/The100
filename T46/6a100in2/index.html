<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6 a 100 in 2</title>
</head>
<body>
    <h1>Somando do 6 ao 100 incrementando 2</h1>
    <script>
        let soma = 0;
        let numero = 6;

        while (numero <= 100) {
            soma += numero;
            numero += 2;
        }

        console.log("A soma dos números de 6 a 100 incrementando 2 é: " + soma);
        document.write("A soma dos números de 6 a 100 incrementando 2 é: " + soma);
    </script>
</body>
</html>
