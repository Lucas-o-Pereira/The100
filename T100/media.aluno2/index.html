<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*Crie um programa que tenha uma função Media(), que vai receber as 2 notas de
um aluno e retornar a sua média para o programa principal e uma outra função
chamada Situacao(), que vai retornar para o programa principal se o aluno está
APROVADO, em RECUPERAÇÃO ou REPROVADO. Essa nova função, vai receber como
parâmetro o resultado retornado pela função Media().*/
 
        function Media(nota1, nota2) {
            return (nota1 + nota2) / 2;
        }

        function Situacao(media) {
            if (media >= 7) {
                return "APROVADO";
            } else if (media >= 5) {
                return "RECUPERAÇÃO";
            } else {
                return "REPROVADO";
            }
        }

        const nota1 = parseFloat(prompt("Digite a primeira nota:"));
        const nota2 = parseFloat(prompt("Digite a segunda nota:"));
        const media = Media(nota1, nota2);
        const situacao = Situacao(media);

        console.log(`Média: ${media}`);
        console.log(`Situação: ${situacao}`);
        alert(`Média: ${media}\nSituação: ${situacao}`);
    </script>
</body>
</html>
