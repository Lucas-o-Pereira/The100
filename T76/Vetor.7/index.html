<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7 Vetor</title>
</head>
<body>
    <script>
        let vetor = [];

        for (let i = 0; i < 7; i++) {
            let numeroAleatorio = Math.floor(Math.random() * 100);
            vetor.push(numeroAleatorio);
        }

        console.log("Vetor preenchido com números aleatórios:");
        console.log(vetor);
    </script>
</body>
</html>
