<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6 num ipar ou par</title>
</head>
<body>
    <script>
         let cont = 0;
            while (cont < 6) {
                let num = parseInt(prompt("Digite um número:"));
                if (num % 2 === 0) {
                    console.log(num + " é par.");
                } else {
                    console.log(num + " é ímpar.");
                }
                cont++;
            }
            
    </script>
</body>
</html>
