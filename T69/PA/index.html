<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progressão aritmética</title>
</head>
<body>
    <script>
        /*Desenvolva um programa que leia o primeiro termo e a razão de uma
PA (Progressão Aritmética), mostrando na tela os 10 primeiros elementos da PA e
a soma entre todos os valores da sequência.*/

        let primeiroTermo = parseFloat(prompt("Digite o primeiro termo da PA:"));
        let razao = parseFloat(prompt("Digite a razão da PA:"));
        let quantidadeTermos = 10;
        let soma = 0;

        console.log("Os 10 primeiros termos da PA são:");
        for (let i = 0; i < quantidadeTermos; i++) {
            let termoAtual = primeiroTermo + i * razao;
            console.log(termoAtual);
            soma += termoAtual;
        }

        console.log("A soma dos 10 primeiros termos da PA é: " + soma); ''
    </script>
</body>
</html>
