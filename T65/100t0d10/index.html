<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 a 0 de 10 em 10</title>
</head>
<body>
    <script>
        let contador = 100;
            do {
                console.log(contador);
                contador -= 10;
            } while (contador >= 0);
            console.log("Acabou!");
    </script>
</body>
</html>
