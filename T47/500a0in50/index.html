<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 a 0 in 50</title>
</head>
<body>
    <h1>Somando de 500 a 0 com incremento de 50</h1>
       <script>
         let soma = 0;
         let numero = 500;
            while (numero >= 0) {
                soma += numero;
                numero -= 50;
            }
            console.log("A soma é: " + soma);
            document.write("A soma é: " + soma);
       </script>
</body>
</html>
