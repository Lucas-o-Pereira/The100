<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SuperSomador</title>
  </head>
  <body>
    <script>
      function SuperSomador(num1, num2) {
        let soma = 0;
        for (let i = num1; i <= num2; i++) {
          soma += i;
        }
        return soma;
      }

      const numero1 = parseInt(prompt("Digite o primeiro número:"));
      const numero2 = parseInt(prompt("Digite o segundo número:"));

      const resultado = SuperSomador(numero1, numero2);
      alert(`A soma dos números entre ${numero1} e ${numero2} é: ${resultado}`);
    </script>
  </body>
</html>
