<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0 a 40 de 5 em 5</title>
</head>
<body>
    <script>
        let contador = 0;
           do {
            console.log(contador);
            contador += 5;
           } while (contador <= 40);
           console.log("Acabou!");
    </script>
</body>
</html>
