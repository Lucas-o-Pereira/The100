<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media alunos</title>
</head>
<body>
    <script>
        let idade = 0;
        let media = 0;
        let totalAlunos = 0;
            do {
                idade = parseInt(prompt("Digite a idade do aluno: (ou 999 para encerrar)"));
                if (idade !== 999) {
                    media += idade;
                    totalAlunos++;
                }
            } while (idade !== 999);
            if (totalAlunos > 0) {
                media /= totalAlunos;
                alert("A média de idade dos alunos é: " + media.toFixed(2));
                alert("O total de alunos é: " + totalAlunos);
            }
    </script>
</body>
</html>
