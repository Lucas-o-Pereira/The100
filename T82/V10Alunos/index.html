<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vetor 10 Alunos</title>
</head>
<body>
    <script>
        let notas = [];
        let soma = 0;
        let maiorNota = 0;
        let posicoesMaiorNota = [];

        for (let i = 0; i < 10; i++) {
            let nota = parseFloat(prompt(`Digite a nota do aluno ${i + 1}:`));
            notas.push(nota);
            soma += nota;

            if (nota > maiorNota) {
                maiorNota = nota;
                posicoesMaiorNota = [i];
            } else if (nota === maiorNota) {
                posicoesMaiorNota.push(i);
            }
        }

        let media = soma / notas.length;
        let alunosAcimaMedia = notas.filter(nota => nota > media).length;

        console.log(`Média da turma: ${media.toFixed(2)}`);
        console.log(`Número de alunos acima da média: ${alunosAcimaMedia}`);
        console.log(`Maior nota digitada: ${maiorNota}`);
        console.log(`Posições da maior nota: ${posicoesMaiorNota.join(', ')}`);
    </script>
</body>
</html>
