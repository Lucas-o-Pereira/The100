<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let nomes = [];
        let idades = [];

        for (let i = 0; i < 9; i++) {
            let nome = prompt(`Digite o nome da pessoa ${i + 1}:`);
            let idade = parseInt(prompt(`Digite a idade de ${nome}:`));

            nomes.push(nome);
            idades.push(idade);
        }

        console.log("Pessoas menores de idade:");
        for (let j = 0; j < idades.length; j++) {
            if (idades[j] < 18) {
                console.log(`${nomes[j]} - ${idades[j]} anos`);
            }
        }
    </script>
</body>
</html>
