<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>incremento 2</title>
</head>
<body>
    <script>
        let num1 = prompt("Digite o primeiro número:");
        let num2 = prompt("Digite o segundo número:");
        let increm = prompt("Digite o valor do incremento:"); 
            while (num1 < num2) {
                console.log(num1);
                num1 = parseFloat(num1) + parseFloat(increm);
            } do {
                console.log(num2);
                num2 = parseFloat(num2) + parseFloat(increm);
            } while (num2 <= num1);
    </script>
</body>
</html>
