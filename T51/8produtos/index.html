<!doctype html>
<html lang="PT-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>8 Produtos</title>
  </head>
  <body>
    <script>
      let preçProdutos = [];
      let maiorPreco = 0;
      let menorPreco = Infinity;
      while (preçProdutos.length < 8) {
        preçProdutos.push(
          parseFloat(
            prompt(
              "Digite o preço do produto " + (preçProdutos.length + 1) + ":",
            ),
          ),
        );
      }
      maiorPreco = Math.max(...preçProdutos);
      menorPreco = Math.min(...preçProdutos);
      alert("O maior preço é: " + maiorPreco);
      alert("O menor preço é: " + menorPreco);
    </script>
  </body>
</html>
