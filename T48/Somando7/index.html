<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>while Somando 7 numeros</title>
</head>
<body>
    <script>
        let soma = 0;
        let contador = 0;

        while (contador < 7) {
            let numero = parseInt(prompt("Digite um número:"));
            soma += numero;
            contador++;
        }

        alert("A soma dos 7 números é: " + soma);
    </script>
</body>
</html>
