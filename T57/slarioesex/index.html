<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
       /*Aplicativo que leia o salário e o sexo de vários funcionários.
No final, mostre o total de salários pagos aos homens e o total pago às
mulheres. O programa vai perguntar ao usuário se ele quer continuar ou não
sempre que ler os dados de um funcionário.*/

let totalSalariosHomens = 0;
let totalSalariosMulheres = 0;
let continuar = true;

while (continuar) {
    let salario = parseFloat(prompt("Digite o salário do funcionário:"));
    let sexo = prompt("Digite o sexo do funcionário (M/F):").toUpperCase();
    if (sexo === "M") {
        totalSalariosHomens += salario;
    } else if (sexo === "F") {
        totalSalariosMulheres += salario;
    } else {
        alert("Sexo inválido. Por favor, digite M para masculino ou F para feminino.");
    }
    continuar = confirm("Deseja continuar cadastrando funcionários?");
}
alert("Total de salários pagos aos homens: R$ " + totalSalariosHomens.toFixed(2) + "\nTotal de salários pagos às mulheres: R$ " + totalSalariosMulheres.toFixed(2));
    </script>
</body>
</html>
