<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
         let soma = 0;
         let numero;
    
         do {
              numero = parseInt(prompt("Digite um número (ou 1111 para encerrar):"));
              if (numero !== 1111) {
                soma += numero;
              }
         } while (numero !== 1111);
    
         alert("A soma dos números digitados é: " + soma);
        
    </script>
</body>
</html>
